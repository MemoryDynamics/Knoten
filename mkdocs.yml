site_name: Emergenz Knoten
site_description: Documentation for the finite-memory Emergenz Knoten project.
repo_url: https://github.com/MemoryDynamics/Knoten
docs_dir: docs

theme:
  name: readthedocs

nav:
  - Start: index.md
  - Aktueller Stand: current_status.md
  - Prioritaeten: project_priorities.md
  - Theorie: THEORETICAL_CONTEXT.md
  - Repository Map: repository_map.md
  - Experimente: experiment_catalog.md
  - Paper-Claims: paper_claims.md

not_in_nav: |
  historical/**
  ChatGPT Chatverläufe/**
  EmergenteRaumzeit/**
  overview/**

markdown_extensions:
  - admonition
  - fenced_code
  - tables
  - toc:
      permalink: true
