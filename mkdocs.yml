  - Markov-Architektur: markov_architecture.md
  - Markov-Anforderungen: markov_requirements.md
  - Projektkarte: project_map.md
  - Architektur: architecture_overview.md
  - Experimente: experiment_catalog.md
  - Reproduzierbarkeit: reproducibility_status.md
  - Haertungsplan: hardening_plan.md
  - Paper-Claims: paper_claims.md
  - Action Matrix: action_matrix.md
  - Theoretical Context: THEORETICAL_CONTEXT.md

markdown_extensions:
  - admonition
  - fenced_code
  - tables
