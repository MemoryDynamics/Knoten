site_name: Emergenz Knoten
site_description: Documentation for the finite-memory Emergenz Knoten project.
repo_url: https://github.com/MemoryDynamics/Knoten
docs_dir: docs

theme:
  name: readthedocs

nav:
  - Start: index.md
  - Aktueller Stand: status/current_status.md
  - Prioritaeten: status/project_priorities.md
  - Theorie: reference/THEORETICAL_CONTEXT.md
  - Repository Map: reference/repository_map.md
  - Experimente: reference/experiment_catalog.md
  - Paper-Claims: status/paper_claims.md

not_in_nav: |
  archive/**
  historical/**
  overview/**

markdown_extensions:
  - admonition
  - fenced_code
  - tables
  - toc:
      permalink: true